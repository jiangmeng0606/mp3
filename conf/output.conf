# 所有配置文件示例
run {
    mode = dev
}
server {
    # 服务启动的ip
    host = "0.0.0.0"
    # 服务启动的端口号
    port = 8080
    tomcat {
        "max-http-form-post-size" = -1
        "max-threads" = 500
    }
}
logging {
    config = "conf/log4j.properties"
}
management {
    info {
        git {
            mode = full
        }
    }
    endpoints {
        shutdown {
            enabled = true
        }
        web {
            exposure {
                "include" = prometheus
            }
            "base-path" = "/actuator"
        }
    }
    server {}
    metrics {
        distribution {
            sla {
                http {
                    server {
                        requests = "1ms,5ms,10ms,50ms,100ms,200ms,500ms,1s,5s"
                    }
                }
            }
        }
        tags {
            application = pentagon
        }
    }
}
spring {
    aop {
        "proxy-target-class" = true
    }
    application {
        name = pentagon
    }
    datasource {
        "db-type" = mysql
        "driver-class-name" = "com.mysql.jdbc.Driver"
        url = "jdbc:mysql://bdp-mysql:3306/tassadar?characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai&zeroDateTimeBehavior=CONVERT_TO_NULL"
        username = bdp
        password = "h@izhi2dp#bdp-core"
    }
    jackson {
        "date-format" = "yyyy-MM-dd HH:mm:ss"
        "property-naming-strategy" = "SNAKE_CASE"
        "time-zone" = "GMT+8"
        deserialization {
            "fail-on-unknown-properties" = false
        }
    }
    jpa {
        "show-sql" = true
        hibernate {
            naming {
                "physical-strategy" = "org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl"
            }
        }
    }
}
redis {
    host = "bdp-redis"
    password = "h1iz6i2dp4redis"
    port = 6679
    database = 0
    keyPrefix = "DI:QUEUE:zhj:zhiliang1"
    sentinel {
        enabled = false
        cluster = [
            "172.16.34.53:6381",
            "172.16.34.54:6381",
            "172.16.34.55:6381"
        ]
        masterId = "online01"
    }
}
mobius {
    maxConnections = 200
}
service {
    mobiusMaxRetryCount = 20
    mobiusForDMC = ""
    # 以下服务配置支持以下两种写法："http://mobius:21923" 或 ["http://mobius:21923"]
    mobius = [
        "http://plat-gateway:21923"
    ]
    mobiusForDeploy = [
        "http://plat-gateway:21923"
    ]
    mobiusDeployIndicator = "/tmp/deploy"
    tassadar = [
        "http://bdp-core:19987"
    ]
    overlord = [
        "http://bdp-core:9527"
    ]
    pandora = [
        "http://bdp-core:8765"
    ]
    thanos = [
        "http://bdp-core:9760"
    ]
    gisp = [
        "http://bdp-core:19291"
    ]
    hora = [
        "http://hora:11729"
    ]
    zoro = [
        "http://bdp-core:8000"
    ]
    usercenter = [
        "http://usercenter:8101"
    ]
    dataBridge = "http://databridge:8089"
    mobiusForImport = [
        "http://plat-gateway:21923"
    ]
    mobiusForOperator = ""
    mobiusLinks = [
        "http://plat-gateway:21923"
    ]
    mobiusForModel = ""
    mobiusForQuery = ""
    dataio = unusedUrl
}
cache {
    enable = false
    doCacheTimeoutS = 500
    doChartTimeoutS = 300
    maxRunningCache = 10
    maxCacheQueueLen = 30
    cacheQuota = 20
}
export {
    useDataX = false
    useJdbc = false
    unionKey = unionKey
}
pagp {
    pgapEnabled = false
    driver = ""
    jdbcUrl = ""
    username = ""
    password = ""
    table = "tb_conf"
}
plan {
    planEnabled = true
    priorityWeight = 8
    planExecutorPoolSize = 5
    planVersionKey = "plan__version"
}
streaming {
    restart {
        interval = 20
    }
}
version {
    initialDelay = 1
    interval = 1
}
task {
    # 保底执行策略，批次在生成 latestExecuteTime 时间之后一定要执行
    latestOptimize = true
    errorMessageLength = 50000
    maxRunningNum = 40
    waitOptimizeCnt = 10
    # 执行队列最多可以存放多少个组合批次，目前只能 1 个
    maxExecuteBatch = 1
    # 保底执行策略，最晚执行时间，默认 120 分钟
    latestExecuteTime = 120
    # 最多可以一次从 redis 预执行队列中取多少个CB
    maxTakeNumFromPreBatch = 40
    # 一次最合并多少个批次
    batchMergeNum = 40
    # 每个 CB 最多进行几次融合
    mergeCountLimit = 1
    # 每次最多可以几个CB一起融合
    batchMergeLimit = 2
    # 批次时间间隔在多少分钟内可以合并到一起
    batchMergeTime = 30
    # CB 超时时间，默认60分钟
    combinationTimeout = 60
    newCreateStateTimeout = 30
    inQueueStateTimeout = 30
    inSchedulingStateTimeout = 30
    resultParsingStateTimeout = 30
    cancelingStateTimeout = 30
    gatewayCommonQueueStateTimeout = 30
    gatewayDispatchingStateTimeout = 30
    gatewayPrivateQueueStateTimeout = 30
    gatewaySchedulingStateTimeout = 30
    mobiusDisposingStateTimeout = 30
    gatewayReleasedStateTimeout = 30
    maxSyncRunningNum = 10
    minCrontabMinutes = 60
    assignMobiusSeconds = 3600
    inMobiusExecutingStateTimeout = 30
    # 批次合并策略，取值有 number、time、all
    batchMergeStrategy = all
    # 对于普通的调度策略，低版本的任务执行成功后，是否要更新表的版本，SaaS默认不需要更新
    olderTaskUpdateVersionOnFinish = false
    # 默认执行引擎
    defaultEngine = spark
}
viewOptimize {
    expansiveCheck = false
    vfieldsConcrete = false
    userHoraClient = true
    autoShield = true
    tempTableEnabled = false
    periodTriggerEnabled = true
    unionCreateAsView = true
    periodTriggerLockKey = "pUpdate__operation"
    periodTriggerUpdateKey = "pUpdate__key"
    shufflePartitionsRules = ""
    mapJoinExpandFactor = 5
    maxDataCountPerTask = 200000
    "dataCountLevel1" = 10000
    "dataCountLevel2" = 200000
    "dataCountLevel3" = 1000000
    # ads 表数据条数上限，-1 无限制
    adsDataCount = 40000000
    nodeNum = 58
    maxDataSizePerTask = 33554432
    defaultPartitions = 10
    # Task 超时时间(分钟
    timeout = 120
    # 支持的最大shuffle partitions
    maxShufflePartitions = 2000
    taskAnalyzeLimit = 1000
    execTimeout = 3000
    blockSize = 1073741824
}
viewThreshold {
    # 是否开启合表运行数据超限检测
    enableOverrunDetect = false
    # 是否开启合表运行增量检测
    enableIncrementDetect = false
    # 容忍上限
    thresholdUpperLimit = 130
    # 总和·表最大数量
    maxTbCount = 5
    # 增量检测最小值 单位(万条)
    incrementLowLimit = 1000
    # 总和·表最大数量 容忍上限
    maxRows = 10000
    # 单表·最大大小 单位(KB)
    maxByteSize = 100000
    # 单表最大行数增量比率
    maxRowsIncrRatio = 20
    # 单表最大大小增量比率
    maxSizeIncrRatio = 20
}
retry = [
    {
        UnknownPartitioning = 2
    },
    {
        "java.io.FileNotFoundException" = 2
    },
    {
        "org.apache.spark.shuffle.MetadataFetchFailedException" = 2
    },
    {
        "not found" = 2
    },
    {
        AlreadyExistsException = 2
    },
    {
        "Futures timed out" = 2
    },
    {
        "The client is stopped" = 2
    },
    {
        ExecutorLostFailure = 1
    },
    {
        "<EOF>" = 1
    },
    {
        "cannot resolve" = 1
    },
    {
        "does not match contents" = 1
    },
    {
        "stopped SparkContext" = 10
    },
    {
        "SparkContext was shut down" = 10
    },
    {
        "mobius is auto renewing" = 10
    }
]
